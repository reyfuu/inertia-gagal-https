services:
  # ── Database (PostgreSQL) ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: tamp_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-tamp_app}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tamp_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-tamp_app}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Aplikasi Laravel ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tamp_app
    restart: unless-stopped
    environment:
      APP_NAME: "${APP_NAME:-TAMP APP}"
      APP_ENV: "${APP_ENV:-production}"
      APP_KEY: "${APP_KEY}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_URL: "${APP_URL:-http://localhost}"

      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: "${DB_DATABASE:-tamp_app}"
      DB_USERNAME: "${DB_USERNAME:-postgres}"
      DB_PASSWORD: "${DB_PASSWORD:-postgres}"

      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CACHE_STORE: database

      LOG_CHANNEL: stderr
      LOG_LEVEL: "${LOG_LEVEL:-error}"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/html/storage
    ports:
      - "${APP_PORT:-8000}:8000"
    networks:
      - tamp_network
    healthcheck:
      test: ["CMD", "php", "artisan", "about", "--only=environment"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Nginx Reverse Proxy (opsional — aktifkan jika ingin port 80/443) ─────────
  # Jika tidak dibutuhkan, hapus atau comment blok ini.
  nginx:
    image: nginx:1.27-alpine
    container_name: tamp_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      # - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app_storage:/var/www/html/storage:ro          # serve file upload langsung
    depends_on:
      app:
        condition: service_healthy
    networks:
      - tamp_network

volumes:
  postgres_data:
    driver: local
  app_storage:
    driver: local

networks:
  tamp_network:
    driver: bridge

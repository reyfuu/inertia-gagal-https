server {
    listen 80;
    server_name _;

    # Teruskan semua request ke container app
    location / {
        proxy_pass         http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Layani file upload (storage) langsung dari Nginx tanpa PHP
    location /storage/ {
        alias /var/www/html/storage/app/public/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Aset statis — cache agresif
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff2?|ttf|eot|svg|webp)$ {
        proxy_pass       http://app:8000;
        proxy_set_header Host $host;
        expires          30d;
        add_header       Cache-Control "public, immutable";
    }

    # Sembunyikan informasi server
    server_tokens off;
}
